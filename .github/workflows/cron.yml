# Ücretsiz zamanlayıcı: 15 dakikada bir ihbar mailboxını ve WordPress senkronunu tetikler.
# Kurulum (repo Settings → Secrets and variables → Actions):
#   - Secret  CRON_SECRET : .env'deki CRON_SECRET ile aynı değer
#   - Variable CRM_URL    : https://<render-app-adresi> (sondaki / olmadan)
name: CRM Cron

on:
  schedule:
    - cron: '*/15 * * * *'
    - cron: '0 3 * * *' # günlük temizlik (cleanup)
  workflow_dispatch: {}

jobs:
  cron:
    # 15 dakikalık zamanlayıcı ve elle tetikleme; günlük temizlik tetiklemesinde koşma
    if: github.event_name != 'schedule' || github.event.schedule == '*/15 * * * *'
    runs-on: ubuntu-latest
    steps:
      - name: İhbar mailbox kontrolü
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ vars.CRM_URL }}/api/cron/check-tips" || echo "check-tips atlandı/başarısız"

      - name: WordPress haber senkronu
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ vars.CRM_URL }}/api/cron/wp-sync" || echo "wp-sync atlandı/başarısız"

      - name: Kampanya bitiş kontrolü
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ vars.CRM_URL }}/api/cron/campaign-expiry" || echo "campaign-expiry atlandı/başarısız"

      - name: Planlı AI yayınları
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ vars.CRM_URL }}/api/cron/publish-scheduled" || echo "publish-scheduled atlandı/başarısız"

      - name: Şehir Panosu — hava durumu
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ vars.CRM_URL }}/api/cron/weather" || echo "weather atlandı/başarısız"

      - name: Şehir Panosu — piyasa (döviz/altın)
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ vars.CRM_URL }}/api/cron/market" || echo "market atlandı/başarısız"

      - name: Acil durum (deprem — AFAD/Kandilli)
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ vars.CRM_URL }}/api/cron/emergency" || echo "emergency atlandı/başarısız"

  cleanup:
    # Günde bir (03:00 UTC): eski feed öğeleri + taslak görselleri + reddedilmiş taslak temizliği
    if: github.event_name != 'schedule' || github.event.schedule == '0 3 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Eski veri temizliği
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ vars.CRM_URL }}/api/cron/cleanup" || echo "cleanup atlandı/başarısız"

      - name: Şehir Panosu — nöbetçi eczane
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ vars.CRM_URL }}/api/cron/pharmacy" || echo "pharmacy atlandı/başarısız"

      - name: Namaz vakitleri
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ vars.CRM_URL }}/api/cron/prayer" || echo "prayer atlandı/başarısız"

      - name: Tekrarlayan faturalar
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ vars.CRM_URL }}/api/cron/recurring-invoices" || echo "recurring-invoices atlandı/başarısız"

      - name: Fatura vade hatırlatmaları
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ vars.CRM_URL }}/api/cron/invoice-reminders" || echo "invoice-reminders atlandı/başarısız"
